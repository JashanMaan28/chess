name = "chess-worker"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# CORS allowed origins as comma-separated. Override per environment.
ALLOWED_ORIGINS = "https://chess-web-zeta.vercel.app,http://localhost:3000"

[[d1_databases]]
binding = "DB"
database_name = "chess"
database_id = "459375e3-c66c-497e-9f58-0177c4b60bf9"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoomDO"

[[durable_objects.bindings]]
name = "MATCHMAKING"
class_name = "MatchmakingDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoomDO", "MatchmakingDO"]

[env.production]
name = "chess-worker"
vars = { ALLOWED_ORIGINS = "https://your-app.vercel.app" }
